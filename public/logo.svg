<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="60" cy="60" r="60" fill="url(#gradient)" />
  
  <!-- DSR Text -->
  <text x="60" y="45" font-family="Arial, sans-serif" font-size="28" font-weight="bold" text-anchor="middle" fill="white">DSR</text>
  
  <!-- Pro Text -->
  <text x="60" y="70" font-family="Arial, sans-serif" font-size="12" font-weight="normal" text-anchor="middle" fill="rgba(255,255,255,0.9)">PRO</text>
  
  <!-- Subtitle -->
  <text x="60" y="85" font-family="Arial, sans-serif" font-size="8" font-weight="normal" text-anchor="middle" fill="rgba(255,255,255,0.7)">POS & ERP</text>
  
  <!-- Decorative Elements -->
  <circle cx="30" cy="30" r="3" fill="rgba(255,255,255,0.3)" />
  <circle cx="90" cy="30" r="2" fill="rgba(255,255,255,0.2)" />
  <circle cx="90" cy="90" r="3" fill="rgba(255,255,255,0.3)" />
  <circle cx="30" cy="90" r="2" fill="rgba(255,255,255,0.2)" />
  
  <!-- Gradient Definition -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C9A96E;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#B8956A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A68B5B;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>